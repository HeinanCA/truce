name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt (must be clean)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Build kubectl plugin binary
        run: go build -o kubectl-truce ./cmd/kubectl-truce

  read-only-guardrail:
    name: read-only guardrail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fail on any mutating client verb (non-test sources)
        run: |
          hits=$(grep -rnE '\.(Create|Update|UpdateStatus|Patch|Delete|DeleteCollection|Apply|ApplyStatus)\(' \
            --include='*.go' internal cmd | grep -v '_test.go' || true)
          if [ -n "$hits" ]; then
            echo "Found mutating client verbs — truce must be strictly read-only:"
            echo "$hits"
            exit 1
          fi
          echo "No mutating verbs found — read-only confirmed."
